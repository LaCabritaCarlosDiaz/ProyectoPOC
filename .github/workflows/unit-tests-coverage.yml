name: Unit Tests Coverage

on:
  workflow_call:

jobs:
  test-coverage:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: MiPrimerProyectoGitHub

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: MiPrimerProyectoGitHub/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test

      - name: Run coverage
        run: npm run test:coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: MiPrimerProyectoGitHub/coverage