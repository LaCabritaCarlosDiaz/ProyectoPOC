name: PR Review

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

# Cancela runs anteriores del mismo PR si se hace un nuevo push
concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MiPrimerProyectoGitHub
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: MiPrimerProyectoGitHub/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build verification
        run: npm run build

      - name: Comment PR with results
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Build verificado exitosamente**\n\n- ✅ Dependencias instaladas\n- ✅ Build de Angular completado\n\n_Revisión automática completada_'
            });
