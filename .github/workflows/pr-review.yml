name: PR Review

on:
  pull_request:
    branches:
      - main

jobs:
  review:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MiPrimerProyectoGitHub
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: MiPrimerProyectoGitHub/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build verification
        run: npm run build

      - name: Comment PR with results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const job = context.job;
            let message = '✅ **Build verificado exitosamente**\n\n';
            message += '- ✅ Dependencias instaladas\n';
            message += '- ✅ Build de Angular completado\n';
            message += '\n_Revisión automática completada_';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
