name: PR Review

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  pull_request_review:
    types:
      - submitted

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  tests:
    uses: ./.github/workflows/unit-tests-coverage.yml

  security:
    uses: ./.github/workflows/sonar-security-analysis.yml

  finalize:
    runs-on: ubuntu-latest
    needs:
      - tests
      - security
    if: ${{ always() }}
    steps:
      - name: Comment PR with results
        if: ${{ needs.tests.result == 'success' && needs.security.result == 'success' }}
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **PR review gate completado**\n\n- ✅ Tests unitarios/cobertura ejecutados\n- ✅ Analisis de seguridad ejecutado\n\nLos reportes están disponibles como artifacts en los workflows hijos.'
            });

      - name: Approve PR
        if: ${{ needs.tests.result == 'success' && needs.security.result == 'success' && github.event_name == 'pull_request_review' && github.event.review.state == 'approved' }}
        run: |
          gh pr review ${{ github.event.pull_request.number }} --approve --body "Aprobado automaticamente: gate de tests y seguridad exitoso."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail when gate fails
        if: ${{ needs.tests.result != 'success' || needs.security.result != 'success' }}
        run: |
          echo "PR review gate failed"
          exit 1
