name: PR Review

on:
  pull_request_review:
    types:
      - submitted

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review-gate:
    if: github.event.review.state == 'approved'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: MiPrimerProyectoGitHub

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: MiPrimerProyectoGitHub/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test

      - name: Run coverage tests
        run: npm run test:coverage

      - name: Run npm audit report (non-blocking)
        run: npm audit --audit-level=high --json > npm-audit-report.json || true

      - name: Run Trivy report (non-blocking)
        run: |
          docker run --rm \
            -v "$PWD":/workdir \
            aquasec/trivy:0.57.1 \
            fs \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            --format json \
            --output /workdir/trivy-report.json \
            /workdir

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: pr-review-security-reports
          path: |
            MiPrimerProyectoGitHub/npm-audit-report.json
            MiPrimerProyectoGitHub/trivy-report.json

      - name: Comment PR with results
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **PR review gate completado**\n\n- ✅ Tests unitarios ejecutados\n- ✅ Cobertura ejecutada\n- ✅ Analisis de seguridad generado (npm audit + Trivy)\n\nSe adjuntaron reportes como artifacts del run.'
            });

      - name: Approve PR
        if: success()
        run: |
          gh pr review ${{ github.event.pull_request.number }} --approve --body "Aprobado automaticamente: tests y analisis de seguridad ejecutados correctamente."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
